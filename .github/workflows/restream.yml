name: Restream
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Source URL
        required: true
      output_url:
        description: Output URL
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg build-essential libssl-dev
          pip install -q yt-dlp curl_cffi
      - name: Get HLS
        id: resolve
        run: |
          hls=$(yt-dlp --impersonate chrome -g --socket-timeout 15 "${{ inputs.source_url }}" 2>/dev/null | tail -1)
          echo "hls=$hls" >> $GITHUB_OUTPUT
      - name: Restream
        run: |
          URL="${{ inputs.output_url }}"
          HLS="${{ steps.resolve.outputs.hls }}"
          if [[ "$URL" == srt://* ]]; then
            # Extract passphrase from URL and pass separately
            PASSPHRASE=$(echo "$URL" | grep -oP 'passphrase=\K[^&]+')
            STREAMID=$(echo "$URL" | grep -oP 'streamid=\K[^&]+')
            BASE_URL=$(echo "$URL" | grep -oP 'srt://[^?]+')
            ffmpeg -nostdin -re \
              -protocol_whitelist "file,http,https,tcp,tls,crypto,srt" \
              -fflags +discardcorrupt \
              -timeout 30000000 \
              -i "$HLS" \
              -map 0:v -map 0:a \
              -c:v copy -c:a copy \
              -f mpegts \
              -srtp_latency 2000 \
              "${BASE_URL}?streamid=${STREAMID}&passphrase=${PASSPHRASE}"
          else
            ffmpeg -nostdin -re \
              -protocol_whitelist "file,http,https,tcp,tls,crypto,srt,rtmp,rtmps" \
              -fflags +discardcorrupt \
              -timeout 30000000 \
              -i "$HLS" \
              -map 0:v -map 0:a \
              -c:v copy -c:a copy \
              -f flv \
              "$URL"
          fi
