name: Restream
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Source URL
        required: true
      output_url:
        description: Kick RTMP/SRT URL
        required: true
      overlay_text:
        description: Overlay text on video
        required: false
        default: ''
      overlay_channel:
        description: Kick channel for chat overlay
        required: false
        default: 'zed-bx'
      browser_overlay_url:
        description: Browser overlay URL (chat, alerts, etc.)
        required: false
        default: ''
      github_token:
        description: GitHub PAT for self-trigger
        required: false
        default: ''
      preview:
        description: Preview mode (no streaming, saves local file)
        required: false
        default: 'false'
      cookies_b64:
        description: Base64-encoded cookies.txt for YouTube sources
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PREVIEW: ${{ inputs.preview }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/restream.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg build-essential libssl-dev fonts-dejavu-core curl unzip
          pip install -q yt-dlp curl_cffi websocket-client pillow
          curl -fsSL https://deno.land/install.sh | sh || true
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Validate font
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          [ -f "$FONT" ] || { echo "FATAL: font missing at $FONT"; exit 1; }

      - name: Setup cookies
        run: |
          RAW="${{ inputs.cookies_b64 }}"
          if [ -n "$RAW" ]; then
            if echo "$RAW" | base64 -d &>/dev/null && echo "$RAW" | base64 -d 2>/dev/null | head -1 | grep -qi 'netscape\|#.*cookie'; then
              echo "$RAW" | base64 -d > cookies.txt
              echo "Cookies decoded from base64 ($(wc -c < cookies.txt) bytes)"
            elif echo "$RAW" | head -1 | grep -qi 'netscape\|#.*cookie'; then
              echo "$RAW" > cookies.txt
              echo "Cookies used as raw text ($(wc -c < cookies.txt) bytes)"
            else
              echo "$RAW" | base64 -d > cookies.txt 2>/dev/null || echo "$RAW" > cookies.txt
              echo "Cookies saved ($(wc -c < cookies.txt) bytes)"
            fi
            echo "COOKIES=--cookies cookies.txt" >> $GITHUB_ENV
          else
            echo "COOKIES=" >> $GITHUB_ENV
            echo "No cookies provided"
          fi

      - name: Try resolve source HLS
        id: resolve
        run: |
          urls=$(yt-dlp --impersonate chrome --remote-components ejs:github --extractor-args "youtube:player_client=web" $COOKIES -g --socket-timeout 30 "${{ inputs.source_url }}" 2>/tmp/yt_err.txt) || true
          cat /tmp/yt_err.txt 2>/dev/null || true
          if [ -z "$urls" ]; then
            echo "live=false" >> "$GITHUB_OUTPUT"
          else
            count=$(echo "$urls" | wc -l)
            if [ "$count" -ge 2 ]; then
              echo "hls=$(echo "$urls" | head -1)" >> "$GITHUB_OUTPUT"
              echo "hls_audio=$(echo "$urls" | tail -1)" >> "$GITHUB_OUTPUT"
            else
              echo "hls=$urls" >> "$GITHUB_OUTPUT"
              echo "hls_audio=" >> "$GITHUB_OUTPUT"
            fi
            echo "live=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download video (non-live)
        if: steps.resolve.outputs.live != 'true'
        run: |
          echo "=== Source not live, downloading ==="
          yt-dlp --impersonate chrome --remote-components ejs:github --extractor-args "youtube:player_client=web" $COOKIES \
            -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" \
            --merge-output-format mp4 -o "source_video.mp4" \
            "${{ inputs.source_url }}" 2>&1 || true
          if [ -f "source_video.mp4" ] && [ -s "source_video.mp4" ]; then
            echo "Downloaded: $(ls -lh source_video.mp4 | awk '{print $5}')"
          else
            echo "ERROR: Source not live and download failed. Nothing to stream."
            exit 1
          fi

      - name: Extract chat channel
        id: chat_channel
        run: |
          OC="${{ inputs.overlay_channel }}"
          if [ -n "$OC" ]; then
            echo "channel=$OC" >> "$GITHUB_OUTPUT"
          else
            url="${{ inputs.source_url }}"
            channel=$(echo "$url" | sed 's|/$||' | awk -F/ '{print $NF}' | grep -oP '^[a-zA-Z0-9_-]+' || echo "")
            echo "channel=${channel:-zed-bx}" >> "$GITHUB_OUTPUT"
          fi

      - name: Start Python chat overlay
        run: |
          if [ -n "${{ inputs.browser_overlay_url }}" ]; then
            echo "chat=fallback" >> "$GITHUB_ENV"
          else
            python3 -c "from PIL import Image; Image.new('RGBA',(400,600),(0,0,0,0)).save('/tmp/chat_overlay_frame.png')"
            rm -f /tmp/chat_overlay_fifo
            mkfifo /tmp/chat_overlay_fifo
            (while true; do cat /tmp/chat_overlay_frame.png 2>/dev/null || break; sleep 0.2; done) > /tmp/chat_overlay_fifo &
            python3 ${{ github.workspace }}/chat_overlay.py --channel ${{ steps.chat_channel.outputs.channel }} --overlay-path /tmp/chat_overlay_frame.png --log-file /tmp/chat_overlay.log &
            echo "chat=python" >> "$GITHUB_ENV"
            sleep 2
          fi

      - name: Schedule self-reboot (before 6h limit)
        if: inputs.github_token != '' && inputs.preview != 'true'
        run: |
          TRIGGER_WORKFLOW() {
            curl -s -X POST \
              -H "Authorization: Bearer ${{ inputs.github_token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/restream.yml/dispatches" \
              -d '{"ref":"main","inputs":{
                "source_url":"${{ inputs.source_url }}",
                "output_url":"${{ inputs.output_url }}",
                "overlay_text":"${{ inputs.overlay_text }}",
                "overlay_channel":"${{ inputs.overlay_channel }}",
                "browser_overlay_url":"${{ inputs.browser_overlay_url }}",
                "github_token":"${{ inputs.github_token }}",
                "cookies_b64":"${{ inputs.cookies_b64 }}"
              }}'
          }
          (sleep 19800 && for i in 1 2 3; do
            echo "Self-reboot attempt $i at $(date)..."
            RESP=$(TRIGGER_WORKFLOW)
            echo "$RESP"
            if echo "$RESP" | grep -q '"id"'; then
              echo "Self-reboot triggered successfully"
              break
            fi
            sleep 30
          done) &

      - name: Stream downloaded video (preview)
        if: steps.resolve.outputs.live != 'true' && inputs.preview == 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          echo "$OT" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt
            sleep 10
          done) &
          BEVELED="drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6"
          VF="[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,$BEVELED[main];[2:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto,format=yuv420p[out];[out]split[mainout][snaptmp];[snaptmp]fps=1/5[snap]"
          (while true; do
            if [ -f /tmp/preview_composite.jpg ]; then
              curl -s -X POST -F "frame=@/tmp/preview_composite.jpg" "https://strwithgit.pythonanywhere.com/preview_frame_upload" >/dev/null 2>&1 || true
            fi
            sleep 3
          done) &
          for attempt in $(seq 1 50); do
            echo "=== Stream attempt $attempt at $(date) ==="
            ffmpeg -nostdin -re -stream_loop -1 -i source_video.mp4 -f image2pipe -framerate 5 -c:v png -i /tmp/chat_overlay_fifo -filter_complex "$VF" -map '[mainout]' -map 0:a -c:v libx264 -preset ultrafast -r 30 -b:v 8000k -maxrate 8000k -bufsize 16000k -g 60 -x264-params "keyint=60:min-keyint=60:level=5.1" -af loudnorm -c:a aac -b:a 128k -f null - -map '[snap]' -f image2 -update 1 -q:v 5 /tmp/preview_composite.jpg && break
            echo "ffmpeg exited with code $?, restarting in 5s..."
            sleep 5
          done

      - name: Stream downloaded video (live)
        if: steps.resolve.outputs.live != 'true' && inputs.preview != 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          echo "$OT" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt
            sleep 10
          done) &
          BEVELED="drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6"
          VF="[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,$BEVELED[main];[1:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto,format=yuv420p[out]"
          ARGS=(
            -nostdin -re -stream_loop -1 -i source_video.mp4
            -f image2pipe -framerate 5 -c:v png -i /tmp/chat_overlay_fifo
            -filter_complex "$VF"
            -map '[out]' -map 0:a
            -c:v libx264 -preset ultrafast
            -r 30 -b:v 6000k -maxrate 6000k -bufsize 12000k
            -g 60
            -x264-params "keyint=60:min-keyint=60:level=5.1"
            -pix_fmt yuv420p
            -c:a aac -b:a 128k
          )
          URL="${{ inputs.output_url }}"
          if [[ "$URL" == srt://* ]]; then
            ARGS+=(-f mpegts -pkt_size 1316 "$URL")
          else
            ARGS+=(-f flv "$URL")
          fi
          ARGS+=(-af loudnorm)
          for attempt in $(seq 1 50); do
            echo "=== Stream attempt $attempt at $(date) ==="
            ffmpeg -hide_banner -loglevel warning "${ARGS[@]}" && break
            EXIT_CODE=$?
            echo "ffmpeg exited with code $EXIT_CODE, restarting in $((attempt * 2))s..."
            sleep $((attempt * 2 > 30 ? 30 : attempt * 2))
          done

      - name: Live restream (preview)
        if: steps.resolve.outputs.live == 'true' && inputs.preview == 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          HLS="${{ steps.resolve.outputs.hls }}"
          HLS_AUDIO="${{ steps.resolve.outputs.hls_audio }}"
          PWL="file,http,https,tcp,tls,crypto,srt,rtmp,rtmps"
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          echo "$OT" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt
            sleep 10
          done) &
          BEVELED="drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6"
          VF="[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,$BEVELED[main];[2:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto,format=yuv420p[out];[out]split[mainout][snaptmp];[snaptmp]fps=1/5[snap]"
          if [ -n "$HLS_AUDIO" ]; then
            VINPUT=(-protocol_whitelist "$PWL" -fflags +discardcorrupt -timeout 30000000 -i "$HLS")
            AINPUT=(-i "$HLS_AUDIO")
            AMAP=(-map 1:a)
            AI=3
          else
            VINPUT=(-protocol_whitelist "$PWL" -fflags +discardcorrupt -timeout 30000000 -i "$HLS")
            AINPUT=()
            AMAP=(-map 0:a)
            AI=1
          fi
          (while true; do
            if [ -f /tmp/preview_composite.jpg ]; then
              curl -s -X POST -F "frame=@/tmp/preview_composite.jpg" "https://strwithgit.pythonanywhere.com/preview_frame_upload" >/dev/null 2>&1 || true
            fi
            sleep 3
          done) &
          for attempt in $(seq 1 50); do
            echo "=== Stream attempt $attempt at $(date) ==="
            ffmpeg -nostdin -re "${VINPUT[@]}" "${AINPUT[@]}" -f image2pipe -framerate 5 -c:v png -i /tmp/chat_overlay_fifo -filter_complex "$VF" -map '[mainout]' "${AMAP[@]}" -af loudnorm -c:v libx264 -preset ultrafast -r 30 -b:v 8000k -maxrate 8000k -bufsize 16000k -g 60 -x264-params "keyint=60:min-keyint=60:level=5.1" -c:a aac -b:a 128k -f null - -map '[snap]' -f image2 -update 1 -q:v 5 /tmp/preview_composite.jpg && break
            echo "ffmpeg exited with code $?, restarting in 5s..."
            sleep 5
          done

      - name: Live restream (live)
        if: steps.resolve.outputs.live == 'true' && inputs.preview != 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          HLS="${{ steps.resolve.outputs.hls }}"
          HLS_AUDIO="${{ steps.resolve.outputs.hls_audio }}"
          PWL="file,http,https,tcp,tls,crypto,srt,rtmp,rtmps"
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          echo "$OT" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt
            sleep 10
          done) &
          BEVELED="drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6"
          VF="[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,$BEVELED[main];[1:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto,format=yuv420p[out]"
          if [ -n "$HLS_AUDIO" ]; then
            VINPUT=(-nostdin -re -protocol_whitelist "$PWL" -fflags +discardcorrupt -timeout 30000000 -i "$HLS")
            AINPUT=(-i "$HLS_AUDIO")
            AMAP=(-map '[out]' -map 1:a)
          else
            VINPUT=(-nostdin -re -protocol_whitelist "$PWL" -fflags +discardcorrupt -timeout 30000000 -i "$HLS")
            AINPUT=()
            AMAP=(-map '[out]' -map 0:a)
          fi
          ARGS=("${VINPUT[@]}" "${AINPUT[@]}" -f image2pipe -framerate 5 -c:v png -i /tmp/chat_overlay_fifo -filter_complex "$VF" "${AMAP[@]}" -af loudnorm -c:v libx264 -preset ultrafast -r 30 -b:v 6000k -maxrate 6000k -bufsize 12000k -g 60 -x264-params "keyint=60:min-keyint=60:level=5.1" -pix_fmt yuv420p -c:a aac -b:a 128k)
          URL="${{ inputs.output_url }}"
          if [[ "$URL" == srt://* ]]; then
            ARGS+=(-f mpegts -pkt_size 1316 "$URL")
          else
            ARGS+=(-f flv "$URL")
          fi
          for attempt in $(seq 1 50); do
            echo "=== Stream attempt $attempt at $(date) ==="
            ffmpeg -hide_banner -loglevel warning "${ARGS[@]}" && break
            EXIT_CODE=$?
            echo "ffmpeg exited with code $EXIT_CODE, restarting in $((attempt * 2))s..."
            sleep $((attempt * 2 > 30 ? 30 : attempt * 2))
          done
